services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: freebudget
      POSTGRES_PASSWORD: freebudget_dev
      POSTGRES_DB: freebudget
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freebudget"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freebudget.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['freebudget.local']"
      PGADMIN_CONFIG_GLOBALLY_DELIVERABLE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  transactions-api:
    build:
      context: .
      dockerfile: src/Services/Transactions/FreeBudget.Transactions.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TransactionsDb=Host=postgres;Database=freebudget_transactions;Username=freebudget;Password=freebudget_dev
    depends_on:
      postgres:
        condition: service_healthy

  categorization-api:
    build:
      context: .
      dockerfile: src/Services/Categorization/FreeBudget.Categorization.Api/Dockerfile
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CategorizationDb=Host=postgres;Database=freebudget_categorization;Username=freebudget;Password=freebudget_dev
    depends_on:
      postgres:
        condition: service_healthy

  ledger-api:
    build:
      context: .
      dockerfile: src/Services/Ledger/FreeBudget.Ledger.Api/Dockerfile
    ports:
      - "5300:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__LedgerDb=Host=postgres;Database=freebudget_ledger;Username=freebudget;Password=freebudget_dev
    depends_on:
      postgres:
        condition: service_healthy

  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/FreeBudget.Identity.Api/Dockerfile
    ports:
      - "5400:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__IdentityDb=Host=postgres;Database=freebudget_identity;Username=freebudget;Password=freebudget_dev
    depends_on:
      postgres:
        condition: service_healthy

  web-api:
    build:
      context: .
      dockerfile: src/Web/FreeBudget.Web.Api/Dockerfile
    ports:
      - "5500:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__Identity=http://identity-api:8080
      - Services__Transactions=http://transactions-api:8080
      - Services__Ledger=http://ledger-api:8080
      - Cors__AllowedOrigins__0=http://localhost:5173
    depends_on:
      - identity-api
      - transactions-api
      - ledger-api

  web-ui:
    build:
      context: ./src/Web/FreeBudget.Web.Ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://web-api:8080
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./src/Web/FreeBudget.Web.Ui:/app
      - /app/node_modules
    depends_on:
      - web-api

volumes:
  pgdata:
  pgadmin_data:
